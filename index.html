<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff7b2f">
<title>🐱 Cat Food Calc</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  :root {
    --bg: #fff8f0;
    --card: #ffffff;
    --orange: #ff7b2f;
    --orange-light: #fff0e6;
    --orange-dark: #e05a10;
    --text: #2d2013;
    --muted: #9a7a60;
    --green: #4caf7d;
    --green-light: #e8f7ef;
    --shadow: 0 4px 24px rgba(255,123,47,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    background: var(--card);
    border-radius: 28px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 380px;
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, var(--orange) 0%, #ffb347 100%);
    padding: 28px 24px 24px;
    text-align: center;
  }
  .paw { font-size: 42px; display: block; margin-bottom: 6px; }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    color: white;
    letter-spacing: 0.5px;
  }
  .header p { color: rgba(255,255,255,0.88); font-size: 13px; font-weight: 600; margin-top: 4px; }
  .body { padding: 28px 24px; }
  label {
    display: block;
    font-weight: 800;
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .input-row { display: flex; gap: 10px; align-items: stretch; }
  input[type="number"] {
    flex: 1;
    border: 2.5px solid #f0e0d0;
    border-radius: 16px;
    padding: 16px 18px;
    font-size: 28px;
    font-family: 'Fredoka One', cursive;
    color: var(--text);
    background: var(--orange-light);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--orange); background: #fff; }
  button.calc {
    background: linear-gradient(135deg, var(--orange) 0%, #ffb347 100%);
    border: none;
    border-radius: 16px;
    padding: 0 22px;
    font-size: 28px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 12px rgba(255,123,47,0.35);
    min-width: 64px;
  }
  button.calc:active { transform: scale(0.94); }
  .result-box {
    margin-top: 22px;
    background: var(--green-light);
    border-radius: 20px;
    padding: 22px 20px;
    text-align: center;
    border: 2.5px solid #b8e8cc;
    display: none;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .result-box.show { display: block; }
  .result-label { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--green); margin-bottom: 8px; }
  .result-number { font-family: 'Fredoka One', cursive; font-size: 52px; color: #2e7d52; line-height: 1; }
  .result-unit { font-size: 14px; font-weight: 700; color: var(--green); margin-top: 4px; }
  .steps { margin-top: 18px; background: #f9f4ef; border-radius: 16px; padding: 16px; display: none; }
  .steps.show { display: block; }
  .steps-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
  .step { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px dashed #e8d8c8; font-size: 14px; color: var(--text); font-weight: 600; }
  .step:last-child { border-bottom: none; }
  .step .val { font-family: 'Fredoka One', cursive; font-size: 16px; color: var(--orange-dark); }
  .divider { height: 1px; background: #f0e4d8; margin: 22px 0; }
  .equation-info { text-align: center; font-size: 12px; color: var(--muted); font-weight: 600; line-height: 1.6; }
  .eq-chip { display: inline-block; background: var(--orange-light); border-radius: 8px; padding: 3px 10px; font-family: 'Fredoka One', cursive; font-size: 14px; color: var(--orange-dark); margin-top: 5px; }
  .error-box { margin-top: 14px; background: #fff0f0; border: 2px solid #ffc0c0; border-radius: 14px; padding: 12px 16px; color: #c0392b; font-size: 13px; font-weight: 700; text-align: center; display: none; }
  .error-box.show { display: block; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="paw">🐾</span>
    <h1>Cat Food Calc</h1>
    <p>Daily portion helper</p>
  </div>
  <div class="body">
    <label for="xInput">Total food amount (grams)</label>
    <div class="input-row">
      <input type="number" id="xInput" placeholder="e.g. 300" inputmode="numeric" min="30" max="9999">
      <button class="calc" onclick="calculate()" title="Calculate">🐱</button>
    </div>
    <div class="error-box" id="errorBox">⚠️ Please enter a number greater than 29</div>
    <div class="result-box" id="resultBox">
      <div class="result-label">✅ Give your cat</div>
      <div class="result-number" id="resultNum">—</div>
      <div class="result-unit">grams</div>
    </div>
    <div class="steps" id="stepsBox">
      <div class="steps-title">🔢 How it was calculated</div>
      <div class="step"><span>Starting amount (X)</span><span class="val" id="s0">—</span></div>
      <div class="step"><span>X − 29</span><span class="val" id="s1">—</span></div>
      <div class="step"><span>÷ 3 (portion to subtract)</span><span class="val" id="s2">—</span></div>
      <div class="step"><span>X − portion</span><span class="val" id="s3">—</span></div>
      <div class="step"><span>− portion again</span><span class="val" id="s4">—</span></div>
    </div>
    <div class="divider"></div>
    <div class="equation-info">
      Using your equation<br>
      <span class="eq-chip">X − 2×((X−29)÷3)</span>
    </div>
  </div>
</div>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
  document.getElementById('xInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') calculate();
  });
  function fmt(n) { return Number.isInteger(n) ? n : n.toFixed(2); }
  function calculate() {
    const input = document.getElementById('xInput');
    const X = parseFloat(input.value);
    const errorBox = document.getElementById('errorBox');
    const resultBox = document.getElementById('resultBox');
    const stepsBox = document.getElementById('stepsBox');
    errorBox.classList.remove('show');
    resultBox.classList.remove('show');
    stepsBox.classList.remove('show');
    if (isNaN(X) || X <= 29) { errorBox.classList.add('show'); return; }
    const step1 = X - 29;
    const step2 = step1 / 3;
    const step3 = X - step2;
    const step4 = step3 - step2;
    document.getElementById('s0').textContent = fmt(X) + 'g';
    document.getElementById('s1').textContent = fmt(step1);
    document.getElementById('s2').textContent = fmt(step2);
    document.getElementById('s3').textContent = fmt(step3);
    document.getElementById('s4').textContent = fmt(step4) + 'g ✓';
    document.getElementById('resultNum').textContent = fmt(step4);
    void resultBox.offsetWidth;
    resultBox.classList.add('show');
    stepsBox.classList.add('show');
  }
</script>
</body>
</html>
